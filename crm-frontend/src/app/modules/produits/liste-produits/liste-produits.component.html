<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Produits</h1>
    <a routerLink="/produits/nouveau" class="btn btn-primary">
      <i class="fas fa-plus me-1"></i>Nouveau produit
    </a>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>#</th><th>Nom</th><th>Catégorie</th><th>Prix</th><th>Disponible</th><th>Date</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of produits">
              <td>{{ p.id }}</td>
              <td>{{ p.nom }}</td>
              <td>{{ p.categorie }}</td>
              <td>{{ p.prixUnitaire | number:'1.2-2' }} €</td>
              <td><i class="fas" [class.fa-check-circle]="p.disponible" [class.fa-times-circle]="!p.disponible"></i></td>
              <td>{{ p.dateCreation | date }}</td>
              <td>
                <a [routerLink]="['/produits', p.id, 'edit']" class="btn btn-sm btn-warning me-1"><i class="fas fa-edit"></i></a>
                <button (click)="delete(p.id!)" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
