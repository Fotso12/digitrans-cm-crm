<div class="container-fluid p-4">
  <h1>{{ isEdit ? 'Modifier' : 'Nouveau' }} produit</h1>
  <div class="card">
    <div class="card-body">
      <form (ngSubmit)="save()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nom *</label>
            <input class="form-control" [(ngModel)]="produit.nom" name="nom" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Catégorie</label>
            <input class="form-control" [(ngModel)]="produit.categorie" name="categorie">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Prix unitaire *</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="produit.prixUnitaire" name="prixUnitaire" required>
          </div>
          <div class="col-md-6 mb-3 form-check d-flex align-items-center mt-4">
            <input type="checkbox" class="form-check-input me-2" [(ngModel)]="produit.disponible" name="disponible" id="disponible">
            <label class="form-check-label" for="disponible">Disponible</label>
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" [(ngModel)]="produit.description" name="description" rows="3"></textarea>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <a routerLink="/produits" class="btn btn-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
