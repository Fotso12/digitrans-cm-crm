<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Campagnes</h1>
    <a routerLink="/campagnes/nouveau" class="btn btn-primary">
      <i class="fas fa-plus me-1"></i>Nouvelle campagne
    </a>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>#</th><th>Nom</th><th>Statut</th><th>Début</th><th>Fin</th><th>Segment</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of campagnes">
              <td>{{ c.id }}</td>
              <td>{{ c.nom }}</td>
              <td><span class="badge" [class.bg-success]="c.statut==='ACTIVE'">{{ c.statut }}</span></td>
              <td>{{ c.dateDebut | date }}</td>
              <td>{{ c.dateFin | date }}</td>
              <td>{{ c.cibleSegment }}</td>
              <td>
                <a [routerLink]="['/campagnes', c.id, 'edit']" class="btn btn-sm btn-warning me-1"><i class="fas fa-edit"></i></a>
                <button (click)="delete(c.id!)" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
