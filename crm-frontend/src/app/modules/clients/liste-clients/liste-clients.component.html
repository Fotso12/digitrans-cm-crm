<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Clients</h1>
    <a routerLink="/clients/nouveau" class="btn btn-primary">
      <i class="fas fa-plus me-1"></i>Nouveau client
    </a>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>#</th><th>Nom</th><th>Prénom</th><th>Téléphone</th><th>Email</th>
              <th>Ville</th><th>Statut</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of clients">
              <td>{{ c.id }}</td>
              <td>{{ c.nom }}</td>
              <td>{{ c.prenom }}</td>
              <td>{{ c.telephone }}</td>
              <td>{{ c.email }}</td>
              <td>{{ c.ville }}</td>
              <td><span class="badge" [class.bg-success]="c.statut === 'ACTIF'">{{ c.statut }}</span></td>
              <td>
                <a [routerLink]="['/clients', c.id]" class="btn btn-sm btn-info me-1"><i class="fas fa-eye"></i></a>
                <a [routerLink]="['/clients', c.id, 'edit']" class="btn btn-sm btn-warning me-1"><i class="fas fa-edit"></i></a>
                <button (click)="delete(c.id!)" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
