<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Commandes</h1>
    <a routerLink="/commandes/nouveau" class="btn btn-primary">
      <i class="fas fa-plus me-1"></i>Nouvelle commande
    </a>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>#</th><th>Référence</th><th>Date</th><th>Montant</th><th>Statut</th><th>Client</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of commandes">
              <td>{{ c.id }}</td>
              <td>{{ c.reference }}</td>
              <td>{{ c.dateCommande | date }}</td>
              <td>{{ c.montantTotal | number:'1.2-2' }} €</td>
              <td><span class="badge" [class.bg-success]="c.statut ==='LIVRÉE'">{{ c.statut }}</span></td>
              <td>{{ c.clientId }}</td>
              <td>
                <a [routerLink]="['/commandes', c.id, 'edit']" class="btn btn-sm btn-warning me-1"><i class="fas fa-edit"></i></a>
                <button (click)="delete(c.id!)" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
