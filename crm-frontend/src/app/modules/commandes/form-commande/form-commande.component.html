<div class="container-fluid p-4">
  <h1>{{ isEdit ? 'Modifier' : 'Nouvelle' }} commande</h1>
  <div class="card">
    <div class="card-body">
      <form (ngSubmit)="save()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Référence *</label>
            <input class="form-control" [(ngModel)]="commande.reference" name="reference" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Statut</label>
            <select class="form-select" [(ngModel)]="commande.statut" name="statut">
              <option>EN_ATTENTE</option><option>CONFIRMÉE</option><option>EN_PRÉPARATION</option>
              <option>LIVRÉE</option><option>ANNULÉE</option>
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Montant total *</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="commande.montantTotal" name="montantTotal" required>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Points attribués</label>
            <input type="number" class="form-control" [(ngModel)]="commande.pointsAttribues" name="pointsAttribues">
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Client ID *</label>
            <input type="number" class="form-control" [(ngModel)]="commande.clientId" name="clientId" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Restaurant ID *</label>
            <input type="number" class="form-control" [(ngModel)]="commande.restaurantId" name="restaurantId" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Date livraison</label>
            <input type="date" class="form-control" [(ngModel)]="commande.dateLivraison" name="dateLivraison">
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">Notes</label>
            <textarea class="form-control" [(ngModel)]="commande.notes" name="notes" rows="3"></textarea>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <a routerLink="/commandes" class="btn btn-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
