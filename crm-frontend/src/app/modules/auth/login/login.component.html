<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">
            <i class="fas fa-utensils me-2"></i>Digitrans CRM
          </h3>
          <form (ngSubmit)="login()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input type="password" class="form-control" [(ngModel)]="motDePasse" name="motDePasse" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Connexion</button>
            <div class="text-center">
              <a routerLink="/auth/register" class="text-decoration-none">Créer un compte</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
