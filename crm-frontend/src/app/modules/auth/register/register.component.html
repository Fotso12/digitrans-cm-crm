<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-5">
      <div class="card shadow border-0 rounded-3">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">
            <i class="fas fa-user-plus me-2 text-primary"></i>Créer un compte
          </h3>

          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="register()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Prénom</label>
                <input type="text" class="form-control" [(ngModel)]="prenom" name="prenom" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control" [(ngModel)]="nom" name="nom" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input type="password" class="form-control" [(ngModel)]="motDePasse" name="motDePasse" required>
            </div>

            <div class="mb-4">
              <label class="form-label">Rôle</label>
              <select class="form-select" [(ngModel)]="role" name="role">
                <option value="ROLE_USER">Utilisateur (Standard)</option>
                <option value="ROLE_ADMIN">Administrateur</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">S'inscrire</button>

            <div class="mt-3 text-center">
              <a routerLink="/auth/login" class="text-decoration-none">Déjà inscrit ? Se connecter</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
