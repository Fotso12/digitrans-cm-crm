<div class="container-fluid p-4">
  <h1>{{ isEdit ? 'Modifier' : 'Nouveau' }} restaurant</h1>
  <div class="card">
    <div class="card-body">
      <form (ngSubmit)="save()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nom *</label>
            <input class="form-control" [(ngModel)]="restaurant.nom" name="nom" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Ville *</label>
            <input class="form-control" [(ngModel)]="restaurant.ville" name="ville" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Adresse</label>
            <input class="form-control" [(ngModel)]="restaurant.adresse" name="adresse">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Téléphone</label>
            <input class="form-control" [(ngModel)]="restaurant.telephone" name="telephone">
          </div>
          <div class="col-md-6 mb-3 form-check d-flex align-items-center mt-4">
            <input type="checkbox" class="form-check-input me-2" [(ngModel)]="restaurant.actif" name="actif" id="actif">
            <label class="form-check-label" for="actif">Actif</label>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <a routerLink="/restaurants" class="btn btn-secondary">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
