<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Restaurants</h1>
    <a routerLink="/restaurants/nouveau" class="btn btn-primary">
      <i class="fas fa-plus me-1"></i>Nouveau restaurant
    </a>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>#</th><th>Nom</th><th>Ville</th><th>Téléphone</th><th>Actif</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let r of restaurants">
              <td>{{ r.id }}</td>
              <td>{{ r.nom }}</td>
              <td>{{ r.ville }}</td>
              <td>{{ r.telephone }}</td>
              <td><i class="fas" [class.fa-check-circle]="r.actif" [class.fa-times-circle]="!r.actif"></i></td>
              <td>
                <a [routerLink]="['/restaurants', r.id, 'edit']" class="btn btn-sm btn-warning me-1"><i class="fas fa-edit"></i></a>
                <button (click)="delete(r.id!)" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
